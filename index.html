// ============================================================
// Field Memo (現場メモ) - with voice-to-text
// ============================================================
let speechRecognition = null;
let isRecording = false;
let recogFinalBuffer = ''; // accumulates finalized text during a session

function genMemoId() {
  return 'memo-' + Date.now() + '-' + Math.random().toString(36).slice(2, 7);
}

function fmtMemoTime(iso) {
  try {
    const d = new Date(iso);
    const yy = d.getFullYear();
    const mm = ('0' + (d.getMonth()+1)).slice(-2);
    const dd = ('0' + d.getDate()).slice(-2);
    const hh = ('0' + d.getHours()).slice(-2);
    const mn = ('0' + d.getMinutes()).slice(-2);
    return `${yy}/${mm}/${dd} ${hh}:${mn}`;
  } catch { return iso; }
}

function renderFieldMemos() {
  const list = document.getElementById('memo-list');
  const countEl = document.getElementById('memo-count');
  countEl.textContent = state.fieldMemos.length;
  if (state.fieldMemos.length === 0) {
    list.innerHTML = '<div class="empty">メモはまだありません</div>';
    return;
  }
  list.innerHTML = '';
  // Newest first
  const sorted = [...state.fieldMemos].sort((a, b) => (b.ts || '').localeCompare(a.ts || ''));
  sorted.forEach(memo => {
    const el = document.createElement('div');
    el.className = 'memo-entry' + (memo.isVoice ? ' voice' : '');
    el.innerHTML = `
      <div class="memo-meta">
        <span>${fmtMemoTime(memo.ts)}</span>
        ${memo.isVoice ? '<span class="badge">🎤 音声</span>' : ''}
      </div>
      <div class="memo-text" data-id="${memo.id}">${escapeHtml(memo.text)}</div>
      <div class="memo-entry-actions">
        <button class="edit" data-id="${memo.id}">編集</button>
        <button class="delete" data-id="${memo.id}">削除</button>
      </div>
    `;
    el.querySelector('.edit').addEventListener('click', () => editFieldMemo(memo.id));
    el.querySelector('.delete').addEventListener('click', () => deleteFieldMemo(memo.id));
    list.appendChild(el);
  });
}

function addFieldMemo(text, isVoice) {
  text = (text || '').trim();
  if (!text) return;
  state.fieldMemos.push({
    id: genMemoId(),
    ts: new Date().toISOString(),
    text: text,
    isVoice: !!isVoice
  });
  renderFieldMemos();
  saveToStorage();
}

function deleteFieldMemo(id) {
  if (!confirm('このメモを削除しますか？')) return;
  state.fieldMemos = state.fieldMemos.filter(m => m.id !== id);
  renderFieldMemos();
  saveToStorage();
  toast('メモを削除しました', 'success');
}

function editFieldMemo(id) {
  const memo = state.fieldMemos.find(m => m.id === id);
  if (!memo) return;
  const newText = prompt('メモを編集', memo.text);
  if (newText === null) return;
  memo.text = newText.trim();
  renderFieldMemos();
  saveToStorage();
  toast('メモを更新しました', 'success');
}

// ---- Speech Recognition ----
function getSpeechRecognition() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return null;
  const rec = new SR();
  rec.lang = 'ja-JP';
  rec.continuous = true;
  rec.interimResults = true;
  return rec;
}

function setMicStatus(text, isRec) {
  const elStatus = document.getElementById('memo-status');
  elStatus.textContent = text;
  elStatus.classList.toggle('recording', !!isRec);
}

function startVoiceMemo() {
  speechRecognition = getSpeechRecognition();
  if (!speechRecognition) {
    toast('お使いのブラウザは音声入力に対応していません。Safari (iPad/Mac) または Chrome をお試しください', 'error');
    return;
  }
  recogFinalBuffer = document.getElementById('memo-input').value;
  if (recogFinalBuffer && !recogFinalBuffer.endsWith(' ') && !recogFinalBuffer.endsWith('\n')) {
    recogFinalBuffer += ' ';
  }

  speechRecognition.onstart = () => {
    isRecording = true;
    const btn = document.getElementById('mic-btn');
    btn.classList.add('recording');
    document.getElementById('mic-label').textContent = '録音を停止';
    setMicStatus('🔴 録音中… 話してください', true);
  };

  speechRecognition.onresult = (event) => {
    let interim = '';
    let finalAdd = '';
    for (let i = event.resultIndex; i < event.results.length; i++) {
      const t = event.results[i][0].transcript;
      if (event.results[i].isFinal) {
        finalAdd += t;
      } else {
        interim += t;
      }
    }
    if (finalAdd) {
      recogFinalBuffer += finalAdd;
    }
    document.getElementById('memo-input').value = recogFinalBuffer + interim;
  };

  speechRecognition.onerror = (e) => {
    setMicStatus('エラー: ' + (e.error || '不明'), false);
    isRecording = false;
    document.getElementById('mic-btn').classList.remove('recording');
    document.getElementById('mic-label').textContent = '音声入力開始';
    if (e.error === 'not-allowed') {
      toast('マイクへのアクセスが拒否されました。ブラウザ設定で許可してください', 'error');
    } else if (e.error === 'no-speech') {
      toast('音声が検出されませんでした', 'error');
    }
  };

  speechRecognition.onend = () => {
    // Auto-restart if user hasn't stopped
    if (isRecording) {
      try { speechRecognition.start(); } catch (e) { /* ignore */ }
    } else {
      document.getElementById('mic-btn').classList.remove('recording');
      document.getElementById('mic-label').textContent = '音声入力開始';
      setMicStatus('', false);
    }
  };

  try {
    speechRecognition.start();
  } catch (e) {
    toast('音声入力の開始に失敗しました: ' + e.message, 'error');
  }
}

function stopVoiceMemo() {
  isRecording = false;
  if (speechRecognition) {
    try { speechRecognition.stop(); } catch (e) { /* ignore */ }
  }
  // Auto-save as voice memo if there's content
  const input = document.getElementById('memo-input');
  const text = input.value.trim();
  if (text && text !== recogFinalBuffer.trim()) {
    // Update with the most recent text
  }
  if (text) {
    addFieldMemo(text, true);
    input.value = '';
    recogFinalBuffer = '';
    toast('音声メモを保存しました', 'success');
  }
  setMicStatus('', false);
}

document.getElementById('mic-btn').addEventListener('click', () => {
  if (isRecording) {
    stopVoiceMemo();
  } else {
    startVoiceMemo();
  }
});

// ============================================================
// Undo system
// ============================================================
const MAX_UNDO = 30;

function pushUndo(entry) {
  state.undoStack.push(entry);
  if (state.undoStack.length > MAX_UNDO) state.undoStack.shift();
}

function performUndo() {
  const entry = state.undoStack.pop();
  if (!entry) {
    toast('取消できる操作がありません', 'error');
    return;
  }
  if (entry.type === 'add-item') {
    _origDeleteItem(entry.payload.id);
    saveToStorage();
  } else if (entry.type === 'add-sketch') {
    state.sketches = state.sketches.filter(s => s.id !== entry.payload.id);
    redrawSketches();
    saveToStorage();
  } else if (entry.type === 'delete-sketch') {
    state.sketches.push(entry.payload);
    redrawSketches();
    saveToStorage();
  } else if (entry.type === 'delete-item') {
    state.items.push(entry.payload);
    renderItem(entry.payload);
    updateUI();
    saveToStorage();
  }
  toast('取消しました', 'success');
}

document.getElementById('btn-undo').addEventListener('click', performUndo);
document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if ((e.ctrlKey || e.metaKey) && e.key === 'z') {
    e.preventDefault();
    performUndo();
  }
});

// Wrap addItem and deleteItem to push undo entries
const _origAddItem = addItem;
addItem = function(item) {
  _origAddItem(item);
  pushUndo({ type: 'add-item', payload: { id: item.id } });
};
const _origDeleteItem = deleteItem;
deleteItem = function(id) {
  const it = state.items.find(x => x.id === id);
  if (it) pushUndo({ type: 'delete-item', payload: JSON.parse(JSON.stringify(it)) });
  _origDeleteItem(id);
};

// ============================================================
// Sketch layer (free-hand annotation)
// ============================================================
const sketchLayerGroup = L.layerGroup().addTo(map);
const sketchLayers = {};

function renderSketch(sk) {
  const line = L.polyline(sk.points, {
    color: sk.color,
    weight: sk.width,
    opacity: 0.92,
    lineCap: 'round',
    lineJoin: 'round',
    smoothFactor: 1.0
  });
  line.on('click', (e) => {
    if (state.eraserMode) {
      L.DomEvent.stopPropagation(e);
      pushUndo({ type: 'delete-sketch', payload: JSON.parse(JSON.stringify(sk)) });
      state.sketches = state.sketches.filter(s => s.id !== sk.id);
      redrawSketches();
      saveToStorage();
      toast('スケッチを削除しました', 'success');
    }
  });
  line.addTo(sketchLayerGroup);
  sketchLayers[sk.id] = line;
}

function redrawSketches() {
  sketchLayerGroup.clearLayers();
  Object.keys(sketchLayers).forEach(k => delete sketchLayers[k]);
  state.sketches.forEach(renderSketch);
}

// ============================================================
// Pointer-based map interaction (pen drag-to-draw + sketch)
// ============================================================
const mapContainer = document.getElementById('map');
let dragHeater = null;
let drawingSketch = null;

function shouldHandlePenAction(e) {
  if (state.inputMode !== 'pen') return false;
  return true;
}

function eventToLatLng(e) {
  const rect = mapContainer.getBoundingClientRect();
  return map.containerPointToLatLng([e.clientX - rect.left, e.clientY - rect.top]);
}

mapContainer.addEventListener('pointerdown', (e) => {
  if (!shouldHandlePenAction(e)) return;
  if (e.target.closest('.leaflet-marker-icon, .leaflet-control, .leaflet-popup, .fab-toolbar, .map-action, .gps-btn, .mode-banner, .sketch-palette')) return;

  const latlng = eventToLatLng(e);

  if (state.activeTool === 'heater') {
    e.preventDefault();
    map.dragging.disable();
    document.body.classList.add('drawing-heater');
    const sm = L.marker(latlng, {
      icon: L.divIcon({
        className: 'custom-pin',
        html: '<div class="pin pin-start"><span>起</span></div>',
        iconSize: [24, 32],
        iconAnchor: [12, 28]
      }),
      interactive: false
    }).addTo(map);
    const line = L.polyline([latlng, latlng], {
      color: COLORS.heater,
      weight: 6,
      opacity: 0.85,
      dashArray: '8 5'
    }).addTo(map);
    const label = L.marker(latlng, {
      icon: L.divIcon({
        className: 'heater-drag-label',
        html: '0m / 0°',
        iconSize: null,
        iconAnchor: [-15, -10]
      }),
      interactive: false
    }).addTo(map);
    dragHeater = { startLatLng: latlng, startMarker: sm, line, label };
    try { mapContainer.setPointerCapture(e.pointerId); } catch (er) {}
  } else if (state.activeTool === 'sketch') {
    e.preventDefault();
    map.dragging.disable();
    const line = L.polyline([latlng], {
      color: state.sketchColor,
      weight: state.sketchWidth,
      opacity: 0.9,
      lineCap: 'round',
      lineJoin: 'round'
    }).addTo(map);
    drawingSketch = {
      color: state.sketchColor,
      width: state.sketchWidth,
      points: [[latlng.lat, latlng.lng]],
      line
    };
    try { mapContainer.setPointerCapture(e.pointerId); } catch (er) {}
  }
});

mapContainer.addEventListener('pointermove', (e) => {
  if (!shouldHandlePenAction(e)) return;
  if (dragHeater) {
    const latlng = eventToLatLng(e);
    dragHeater.line.setLatLngs([dragHeater.startLatLng, latlng]);
    const dist = map.distance(dragHeater.startLatLng, latlng);
    const az = bearing([dragHeater.startLatLng.lat, dragHeater.startLatLng.lng], [latlng.lat, latlng.lng]);
    dragHeater.label.setLatLng(latlng);
    dragHeater.label.setIcon(L.divIcon({
      className: 'heater-drag-label',
      html: `${Math.round(dist)}m / ${Math.round(az)}°`,
      iconSize: null,
      iconAnchor: [-15, -10]
    }));
  } else if (drawingSketch) {
    const latlng = eventToLatLng(e);
    const last = drawingSketch.points[drawingSketch.points.length - 1];
    const lastPx = map.latLngToContainerPoint(L.latLng(last[0], last[1]));
    const curPx = map.latLngToContainerPoint(latlng);
    const dx = curPx.x - lastPx.x;
    const dy = curPx.y - lastPx.y;
    if (dx * dx + dy * dy >= 4) {
      drawingSketch.points.push([latlng.lat, latlng.lng]);
      drawingSketch.line.setLatLngs(drawingSketch.points);
    }
  }
});

function endPointerAction(e) {
  if (!shouldHandlePenAction(e)) return;

  if (dragHeater) {
    const endLatLng = eventToLatLng(e);
    const dist = map.distance(dragHeater.startLatLng, endLatLng);
    map.removeLayer(dragHeater.startMarker);
    map.removeLayer(dragHeater.line);
    map.removeLayer(dragHeater.label);
    map.dragging.enable();
    document.body.classList.remove('drawing-heater');

    if (dist >= 2) {
      const az = bearing([dragHeater.startLatLng.lat, dragHeater.startLatLng.lng], [endLatLng.lat, endLatLng.lng]);
      const length = Math.round(dist);
      const azimuth = Math.round(az);
      const watts = 160;
      const item = {
        id: genId(),
        type: 'heater',
        name: 'ヒーター-' + (state.items.filter(i => i.type === 'heater').length + 1),
        start: [dragHeater.startLatLng.lat, dragHeater.startLatLng.lng],
        end: [endLatLng.lat, endLatLng.lng],
        length: length,
        azimuth: azimuth,
        watts: watts,
        totalW: length * watts,
        note: '',
        photos: []
      };
      addItem(item);
      saveToStorage();
      toast(`✏️ ヒーター線を配置: ${length}m / 方位${azimuth}° — 線をタップで詳細編集`, 'success');
    } else {
      state.heaterStart = [dragHeater.startLatLng.lat, dragHeater.startLatLng.lng];
      handleHeaterClick(dragHeater.startLatLng.lat, dragHeater.startLatLng.lng);
    }
    dragHeater = null;
  } else if (drawingSketch) {
    map.dragging.enable();
    if (drawingSketch.points.length >= 2) {
      const sk = {
        id: 'sketch-' + Date.now() + '-' + Math.random().toString(36).slice(2, 7),
        color: drawingSketch.color,
        width: drawingSketch.width,
        points: drawingSketch.points,
        createdAt: new Date().toISOString()
      };
      state.sketches.push(sk);
      pushUndo({ type: 'add-sketch', payload: { id: sk.id } });
      map.removeLayer(drawingSketch.line);
      renderSketch(sk);
      saveToStorage();
    } else {
      map.removeLayer(drawingSketch.line);
    }
    drawingSketch = null;
  }
}

mapContainer.addEventListener('pointerup', endPointerAction);
mapContainer.addEventListener('pointercancel', endPointerAction);

// Hook fab-tool selection to sync sketch palette + add sketch hint
document.querySelectorAll('.fab-tool').forEach(btn => {
  btn.addEventListener('click', () => setTimeout(syncSketchPalette, 0));
});

// Extend TOOL_MODES to include sketch
if (typeof TOOL_MODES !== 'undefined') {
  TOOL_MODES.sketch = { icon: '🖊️', name: 'スケッチ', hint: 'ペンで地図上に直接描画（線・矢印・文字など）' };
}

// Add sketch to keyboard shortcuts (7)
document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.key === '7') {
    const sk = document.querySelector('.fab-tool[data-type="sketch"]');
    if (sk && state.inputMode === 'pen') sk.click();
  }
});

// ============================================================
// Initial check for browser support
(function checkSpeechSupport() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    const btn = document.getElementById('mic-btn');
    btn.disabled = true;
    btn.style.opacity = '0.5';
    btn.style.cursor = 'not-allowed';
    document.getElementById('mic-label').textContent = '音声入力非対応';
    document.getElementById('memo-status').textContent = 'このブラウザは音声入力に対応していません';
  }
})();

// ============================================================
// Init
// ============================================================
loadFromStorage().then(loaded => {
  renderFieldMemos();
  if (!loaded) {
    updateUI();
    // Auto-acquire GPS for initial map center (silent fallback to default)
    autoCenterByGps();
  } else {
    // If saved data exists but it's an old/empty session without items, also try GPS
    if (!state.items || state.items.length === 0) {
      autoCenterByGps();
    }
  }
});

async function autoCenterByGps() {
  if (!navigator.geolocation) return;
  setTimeout(async () => {
    try {
      const pos = await acquireGps({ panMap: true, zoom: 19, timeout: 8000 });
      toast(`現在地で地図を表示しました (精度 ${formatAcc(pos.accuracy)})`, 'success');
    } catch (err) {
      // Silent fall-back: keep default location
      console.log('GPS auto-center skipped:', err.message);
    }
  }, 600);
}

// Auto-save on map move
let saveDebounce;
map.on('moveend zoomend', () => {
  clearTimeout(saveDebounce);
  saveDebounce = setTimeout(saveToStorage, 1000);
});

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  const keys = { '0': 'nav', '1': 'heater', '2': 'panel', '3': 'power', '4': 'wire', '5': 'area', '6': 'memo' };
  if (keys[e.key]) {
    const btn = document.querySelector(`.fab-tool[data-type="${keys[e.key]}"]`);
    if (btn) btn.click();
  }
  if (e.key === 'Escape') {
    cancelDrawing();
    // Switch back to nav mode on Escape
    const navBtn = document.querySelector('.fab-tool[data-type="nav"]');
    if (navBtn) navBtn.click();
    closeHeaterModal();
    closeMarkerModal();
  }
});

</script>
